springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 5000
  address: 0.0.0.0

spring:
  profiles:
#    active: ${SPRING_PROFILES_ACTIVE:postgres}
     active: h2
  application:
    name: test-management-api
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:user@gmail.com}
    password: ${SMTP_PASSWORD:password}
    to: ${MAIL_TO:test@test.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
app:
  baseUrl: ${APP_BASE_URL:http://localhost:3000}


logging:
  level:
    com.testmanagement: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
